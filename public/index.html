<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новости</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Новости</p>
        <h1 id="pageTitle">Новости</h1>
      </div>
      <button class="refresh" id="refreshButton" type="button" aria-label="Обновить новости">
        <span aria-hidden="true">↻</span>
      </button>
    </header>

    <main class="layout">
      <section class="controls" aria-label="Фильтры">
        <div class="filter-row" aria-label="Категории">
          <button class="chip category-chip active" type="button" data-category="all">Все</button>
          <button class="chip category-chip" type="button" data-category="games">Игры</button>
          <button class="chip category-chip" type="button" data-category="software">Софт</button>
          <button class="chip category-chip" type="button" data-category="hardware">Железо</button>
          <button class="chip category-chip" type="button" data-category="tech">Технологии</button>
        </div>

        <div class="filter-row" aria-label="Источники">
          <button class="chip source-chip active" type="button" data-source="all" aria-pressed="true">Все источники</button>
          <button class="chip source-chip" type="button" data-source="PlayGround.ru" aria-pressed="false">PlayGround</button>
          <button class="chip source-chip" type="button" data-source="GoHa.ru" aria-pressed="false">GoHa</button>
          <button class="chip source-chip" type="button" data-source="Igromania.ru" aria-pressed="false">Igromania</button>
          <button class="chip source-chip" type="button" data-source="StopGame.ru" aria-pressed="false">StopGame</button>
          <button class="chip source-chip" type="button" data-source="VGTimes" aria-pressed="false">VGTimes</button>
          <button class="chip source-chip" type="button" data-source="IXBT.games" aria-pressed="false">IXBT.games</button>
          <button class="chip source-chip" type="button" data-source="DTF" aria-pressed="false">DTF</button>
          <button class="chip source-chip" type="button" data-source="3DNews" aria-pressed="false">3DNews</button>
          <button class="chip source-chip" type="button" data-source="iXBT" aria-pressed="false">iXBT</button>
          <button class="chip source-chip" type="button" data-source="Habr" aria-pressed="false">Habr</button>
          <button class="chip source-chip" type="button" data-source="OpenNET" aria-pressed="false">OpenNET</button>
          <button class="chip source-chip" type="button" data-source="SecurityLab" aria-pressed="false">SecurityLab</button>
          <button class="chip source-chip" type="button" data-source="Comss" aria-pressed="false">Comss</button>
          <button class="chip source-chip" type="button" data-source="4PDA" aria-pressed="false">4PDA</button>
          <button class="chip source-chip" type="button" data-source="CNews" aria-pressed="false">CNews</button>
          <button class="chip source-chip" type="button" data-source="GECID" aria-pressed="false">GECID</button>
          <button class="chip source-chip" type="button" data-source="Overclockers.ua" aria-pressed="false">Overclockers.ua</button>
        </div>
      </section>

      <div class="content">
        <section class="status" id="status" aria-live="polite">Загружаю новости...</section>
        <section class="grid" id="newsGrid" aria-label="Список новостей"></section>
      </div>
    </main>

    <template id="newsCardTemplate">
      <article class="card">
        <div class="meta">
          <span class="source"></span>
          <time></time>
        </div>
        <h2></h2>
        <p></p>
        <a class="more" target="_blank" rel="noopener noreferrer">Ещё</a>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
