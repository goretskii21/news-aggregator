name = "news-aggregator"
main = "src/worker.js"
compatibility_date = "2026-06-30"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[triggers]
crons = ["*/10 * * * *"]

# After creating a KV namespace, uncomment this block and replace the IDs.
# The Worker also runs without KV, but KV is recommended for production cache.
# [[kv_namespaces]]
# binding = "NEWS_CACHE"
# id = "replace-with-production-kv-namespace-id"
# preview_id = "replace-with-preview-kv-namespace-id"
