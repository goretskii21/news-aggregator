services:
  news-aggr:
    build:
      context: .
    container_name: news-aggr
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      NODE_ENV: production
    ports:
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/api/news"]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 20s
